spring.application.name=ai-review-service

# Server
server.port=8080
spring.application.name=ai-review-service

# Multipart file upload (pay stubs can be a few MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging — show AUDIT and service call logs clearly
logging.level.com.lending.aireview=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

# LLM config — not used in mock but shows where production values would go
# llm.api.key=${LLM_API_KEY}
# llm.api.url=https://api.openai.com/v1/chat/completions
# llm.model=gpt-4o
# llm.timeout.seconds=30

# Income discrepancy tolerance (5% — see DiscrepancyService)
# review.income.tolerance.percent=0.05